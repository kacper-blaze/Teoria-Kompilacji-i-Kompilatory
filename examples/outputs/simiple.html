<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokolorowany kod</title>
  <style>
    body { background: #1e1e1e; color: #d4d4d4; font-family: Consolas, monospace; margin: 24px; }
    pre { white-space: pre; margin: 0; }
    .tok-keyword { color: #569cd6; font-weight: bold; }
    .tok-identifier { color: #9cdcfe; }
    .tok-number { color: #b5cea8; }
    .tok-string { color: #ce9178; }
    .tok-comment { color: #6a9955; font-style: italic; }
    .tok-operator { color: #d4d4d4; }
    .tok-delimiter { color: #dcdcaa; }
    .tok-unknown { color: #f44747; text-decoration: underline; }
  </style>
</head>
<body>
  <pre><span class="tok-comment">// Prosty przykład</span>
<span class="tok-keyword">function</span> <span class="tok-identifier">add</span><span class="tok-delimiter">(</span><span class="tok-identifier">a</span><span class="tok-delimiter">,</span> <span class="tok-identifier">b</span><span class="tok-delimiter">)</span> <span class="tok-delimiter">{</span>
    <span class="tok-keyword">return</span> <span class="tok-identifier">a</span> <span class="tok-operator">+</span> <span class="tok-identifier">b</span><span class="tok-delimiter">;</span>
<span class="tok-delimiter">}</span>
</pre>
</body>
</html>
